services:
  postgres:
    image: postgis/postgis:16-3.4
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: doktori
      POSTGRES_USER: doktori
      POSTGRES_PASSWORD: doktori_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

  meilisearch:
    image: getmeili/meilisearch:v1.12
    ports:
      - "7701:7700"
    environment:
      MEILI_MASTER_KEY: doktori_dev_key
      MEILI_ENV: development
    volumes:
      - msdata:/meili_data

volumes:
  pgdata:
  msdata:
