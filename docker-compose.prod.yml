services:
  doktori-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doktori-web
    ports:
      - "3005:3000"
    env_file: .env
    restart: unless-stopped
    networks:
      - dartank-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  dartank-network:
    external: true
