services:
  doktori-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doktori-web
    ports:
      - "3005:3000"
    env_file: .env
    environment:
      - TZ=Africa/Tunis
      - REDIS_URL=redis://:${REDIS_PASSWORD}@doktori-redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dartank-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://0.0.0.0:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  doktori-socket:
    # Socket.IO server (peer-doctor chat + SOS rooms). Reuses the web
    # image — same node_modules, same TypeScript runtime — and starts the
    # tsx-compiled socket entry point instead of next.
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doktori-socket
    command: ["node", "node_modules/.bin/tsx", "apps/web/sockets/sos-server.ts"]
    working_dir: /app
    ports:
      - "3010:3010"
    env_file: .env
    environment:
      - TZ=Africa/Tunis
      - SOCKETIO_PORT=3010
    restart: unless-stopped
    networks:
      - dartank-network

  redis:
    image: redis:7-alpine
    container_name: doktori-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    restart: unless-stopped
    networks:
      - dartank-network
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  dartank-network:
    external: true

volumes:
  redis-data:
